name: Update SecOps Skills References

on:
  schedule:
    - cron: '0 0 1,15 * *'  # Bi-weekly: 1st and 15th at midnight UTC
  workflow_dispatch:           # Allow manual triggering from GitHub UI

jobs:
  update-references:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run reference updater
        run: python3 scripts/update_references.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/secops-siem-search/references/all-log-types.md
          git commit -m "docs: automated bi-weekly reference update [skip ci]"
          git push
